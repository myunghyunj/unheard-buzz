project:
  name: "Telehealth for Pets"
  description: "Voice-of-customer listening brief on veterinary telehealth adoption, diagnosis trust, scheduling friction, and continuity-of-care gaps."
  objectives:
    - "Identify what stops pet owners from trusting or reusing tele-vet services."
    - "Separate urgent-care pain points from chronic-care and convenience use cases."
    - "Capture moments where people still escalate to ER or in-person care despite starting remotely."
  target_audiences:
    - "Pet telehealth startups"
    - "Veterinary service operators"
    - "Consumer health and pet-care investors"
  key_questions:
    - "Where does tele-vet care feel fast and convenient versus shallow and risky?"
    - "What complaints cluster around diagnosis confidence, triage, and follow-through?"
    - "Which segments want reassurance, prescription access, or specialist continuity most?"
  decision_uses:
    - "Prioritize product improvements for intake, triage, follow-up, and trust-building."
    - "Refine messaging around when telehealth is and is not a fit."

analysis:
  min_comment_words: 10
  include_irrelevant_in_stats: false
  language_allowlist: ["en"]
  dedup_normalized_text: true
  dedup_min_chars: 40
  relevance_keywords:
    - "telehealth"
    - "telemedicine"
    - "virtual vet"
    - "online vet"
    - "pet consultation"
    - "veterinarian"
    - "remote vet"
    - "vet app"
    - "urgent care"
  segments:
    URGENT:
      name: "Urgent symptom triage"
      description: "Owners seeking immediate direction for acute symptoms or possible emergencies."
      keywords: ["emergency", "urgent", "middle of the night", "er", "poison", "suddenly"]
    CHRONIC:
      name: "Chronic management"
      description: "Ongoing conditions, medication, follow-up, and long-term monitoring."
      keywords: ["chronic", "follow up", "refill", "ongoing", "allergy", "arthritis", "monitoring"]
    NEW_OWNER:
      name: "First-time owner reassurance"
      description: "New pet parents seeking reassurance, education, or lower-friction access."
      keywords: ["new puppy", "new kitten", "first time owner", "first-time owner", "not sure if normal"]
  categories:
    AC:
      name: "Access & scheduling"
      description: "Availability, wait time, appointment booking, and after-hours access issues."
      keywords: ["appointment", "schedule", "booking", "wait", "availability", "after hours", "weekend"]
    DA:
      name: "Diagnosis confidence"
      description: "Perceived misdiagnosis, shallow assessment, uncertainty, and fear of missing something serious."
      keywords: ["diagnosis", "misdiagnosis", "not confident", "couldn't tell", "uncertain", "triage", "serious"]
    CO:
      name: "Cost & coverage"
      description: "Consultation cost, subscription value, insurance issues, and paying twice."
      keywords: ["cost", "expensive", "price", "fee", "insurance", "coverage", "pay twice", "subscription"]
    UX:
      name: "User experience & technology"
      description: "Video quality, app friction, form fatigue, upload issues, and poor communication flow."
      keywords: ["app", "video", "lag", "crash", "upload", "chat", "interface", "form", "technical"]
    RX:
      name: "Prescription & follow-through"
      description: "Medication access, lab escalation, referral handoff, and continuity problems."
      keywords: ["prescription", "rx", "medication", "refill", "lab", "referral", "follow up", "pharmacy"]
    SP:
      name: "Specialist access"
      description: "Need for deeper expertise or breed/condition-specific advice."
      keywords: ["specialist", "expert", "dermatology", "cardiology", "behaviorist", "oncology"]
    WI:
      name: "Wish / improvements"
      description: "Requests for faster reassurance, better continuity, and clearer next steps."
      keywords: ["wish", "hope", "want", "need", "better", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bbetter\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: true
    api_key_env: "YOUTUBE_API_KEY"
    search_queries:
      - "virtual vet experience"
      - "online vet consultation review"
      - "telehealth for pets problems"
    priority_channels:
      - name: "Bond Vet"
        content_style: "brand / educational"
      - name: "The Kitten Lady"
        content_style: "owner education"
    video_priority_keywords:
      - "telehealth"
      - "virtual vet"
      - "review"
      - "experience"
      - "urgent care"
    quota:
      max_channels: 14
      max_videos_per_channel: 8
      max_comments_per_video: 120
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 10

  reddit:
    enabled: true
    subreddits: ["pets", "dogs", "cats", "AskVet", "VetTech"]
    search_queries:
      - "telehealth vet"
      - "online vet consultation"
      - "virtual vet prescription"
      - "remote vet emergency"
    sort: "relevance"
    time_filter: "year"
    quota:
      max_posts_per_query: 50
      max_comments_per_post: 100

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries: []
    search_operators: "-is:retweet lang:en"
    quota:
      max_results_per_query: 0
      max_total_tweets: 0

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

reporting:
  quote_count: 20
  max_cooccurrence_pairs: 10
  top_category_limit: 8

validation:
  enabled: false
  references: []
