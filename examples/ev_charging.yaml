project:
  name: "Electric Vehicle Charging Unmet Needs"
  description: "Cross-platform listening brief on reliability, queueing, payment friction, and infrastructure experience across EV charging journeys."
  objectives:
    - "Separate core charging pain points into reliability, wait time, pricing, and interoperability themes."
    - "Compare public-fast-charging frustration against home-charging and road-trip scenarios."
    - "Extract quotable complaints that indicate broken trust, churn risk, or app-switching behavior."
  target_audiences:
    - "EV charging network operators"
    - "Automotive product and partnerships teams"
    - "Mobility and infrastructure investors"
  key_questions:
    - "Which issues make drivers distrust a charging network before arrival?"
    - "Where do app, pricing, and payment problems matter as much as charger hardware?"
    - "Which complaints are uniquely intense in public fast charging versus home charging?"
  decision_uses:
    - "Prioritize hardware, software, pricing, and on-site experience improvements."
    - "Shape differentiated messaging for reliability and convenience."

analysis:
  min_comment_words: 12
  include_irrelevant_in_stats: false
  language_allowlist: ["en"]
  dedup_normalized_text: true
  dedup_min_chars: 40
  relevance_keywords:
    - "electric vehicle"
    - "ev"
    - "ev charging"
    - "charging station"
    - "charger"
    - "supercharger"
    - "dc fast charger"
    - "level 2 charger"
    - "home charger"
    - "public charger"
    - "ccs"
    - "nacs"
    - "charging app"
  segments:
    PUBLIC_FAST:
      name: "Public fast charging"
      description: "Trips, highway stops, and public DC fast charging use cases."
      keywords: ["dc fast", "fast charger", "public charger", "road trip", "supercharger", "station"]
    HOME:
      name: "Home charging"
      description: "Residential charging setups, electricians, and overnight charging."
      keywords: ["home charger", "garage", "level 2", "breaker", "electrician", "overnight"]
    ROADTRIP:
      name: "Road trip / long distance"
      description: "Long-haul and route-planning contexts with queueing or coverage concerns."
      keywords: ["road trip", "interstate", "highway", "route planning", "long distance"]
  categories:
    AV:
      name: "Availability & wait times"
      description: "Finding an open charger, waiting in line, and stalls being blocked or occupied."
      keywords: ["available", "queue", "line", "waiting", "occupied", "full", "blocked", "stall"]
    SP:
      name: "Charging speed & performance"
      description: "Slow sessions, throttled power, inconsistent kW delivery, and long stops."
      keywords: ["slow", "speed", "kw", "charging speed", "throttle", "derated", "time", "session took"]
    RE:
      name: "Reliability & maintenance"
      description: "Broken chargers, fault codes, downtime, and confidence loss before arrival."
      keywords: ["broken", "fault", "error", "offline", "maintenance", "out of service", "not working"]
    CO:
      name: "Cost & pricing"
      description: "Per-kWh cost, session fees, membership confusion, and bill shock."
      keywords: ["cost", "expensive", "price", "fee", "membership", "subscription", "idle fee", "per kwh"]
    APP:
      name: "App / payment friction"
      description: "Sign-in, app lock-in, payment failures, RFID confusion, and receipt issues."
      keywords: ["app", "payment", "credit card", "tap to pay", "rfid", "account", "login", "billing", "receipt"]
    CP:
      name: "Compatibility & connectors"
      description: "Connector mismatch, adapters, port standards, and car-network interoperability."
      keywords: ["ccs", "chademo", "nacs", "adapter", "connector", "plug", "compatibility", "port"]
    SITE:
      name: "Site amenities & safety"
      description: "Lighting, weather exposure, restroom access, location safety, and family convenience."
      keywords: ["lighting", "restroom", "bathroom", "unsafe", "weather", "covered", "amenities", "parking lot"]
    WI:
      name: "Wish / improvements"
      description: "Direct improvement asks and ideal-station wish language."
      keywords: ["wish", "hope", "want", "need", "better", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bbetter\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: true
    api_key_env: "YOUTUBE_API_KEY"
    search_queries:
      - "ev charging problems"
      - "public fast charger broken"
      - "ev road trip charging issues"
      - "home charger install problems"
    priority_channels:
      - name: "Out of Spec Reviews"
        content_style: "expert review"
        rationale: "Large EV owner audience with detailed station complaints."
      - name: "State of Charge"
        content_style: "owner education"
      - name: "Chargeway"
        content_style: "charging explainer"
    video_priority_keywords:
      - "charging"
      - "charger"
      - "broken"
      - "road trip"
      - "fast charger"
      - "home charging"
      - "charging network"
    quota:
      max_channels: 18
      max_videos_per_channel: 8
      max_comments_per_video: 160
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 15

  reddit:
    enabled: true
    subreddits: ["electricvehicles", "EVcharging", "TeslaLounge", "F150Lightning", "ioniq5"]
    search_queries:
      - "EV charging problem"
      - "fast charger broken"
      - "charging station queue"
      - "tap to pay charger failed"
      - "home charger install problem"
    sort: "relevance"
    time_filter: "year"
    quota:
      max_posts_per_query: 60
      max_comments_per_post: 120

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries:
      - "\"charging station\" broken EV"
      - "\"EV charging\" queue"
    search_operators: "-is:retweet lang:en"
    quota:
      max_results_per_query: 50
      max_total_tweets: 200

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

reporting:
  quote_count: 25
  max_cooccurrence_pairs: 12
  top_category_limit: 8

validation:
  enabled: false
  references: []
