project:
  name: "Electric Vehicle Charging Unmet Needs"
  description: "Mining EV owners' feedback on charging infrastructure, availability, cost, speed, and reliability"

analysis:
  min_comment_words: 15
  include_irrelevant_in_stats: false
  relevance_keywords:
    - "electric vehicle"
    - "EV"
    - "EV charging"
    - "charging station"
    - "supercharger"
    - "DC fast charger"
    - "charger"
    - "charging network"
    - "home charger"
    - "public charger"
    - "CCS"
    - "CHAdeMO"
  categories:
    AV:
      name: "Availability & wait times"
      description: "Station availability, queues, and finding an open charger"
      keywords: ["station", "charger", "available", "queue", "waiting", "occupied"]
    SP:
      name: "Charging speed"
      description: "Slow charging, long sessions, and charger performance"
      keywords: ["speed", "slow", "fast", "kW", "level 2", "DC fast", "time"]
    CO:
      name: "Cost & pricing"
      description: "Cost per kWh, memberships, and pricing pain points"
      keywords: ["cost", "expensive", "price", "membership", "subscription", "fee"]
    RE:
      name: "Reliability & maintenance"
      description: "Broken chargers, fault codes, and downtime"
      keywords: ["broken", "fault", "maintenance", "out of service", "not working"]
    CP:
      name: "Compatibility & connectors"
      description: "Connector types and adapter issues"
      keywords: ["CCS", "CHAdeMO", "adapter", "connector", "plug", "compatibility"]
    WI:
      name: "Wish / improvements"
      description: "Explicit improvement ideas and desires"
      keywords: ["wish", "hope", "want", "need", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: false
    api_key_env: "YOUTUBE_API_KEY"
    search_queries: []
    priority_channels: []
    video_priority_keywords: []
    quota:
      max_channels: 0
      max_videos_per_channel: 0
      max_comments_per_video: 0
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 0

  reddit:
    enabled: true
    subreddits: ["electricvehicles", "EVcharging", "TeslaModel3"]
    search_queries:
      - "EV charging problem"
      - "EV charger broken"
      - "charging station queues"
    sort: "relevance"
    time_filter: "all"
    quota:
      max_posts_per_query: 50
      max_comments_per_post: 100

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries: []
    search_operators: ""
    quota:
      max_results_per_query: 0
      max_total_tweets: 0

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

validation:
  enabled: false
  references: []
