project:
  name: "Amputee Prosthetic Unmet Needs"
  description: "Mining patient-voice data across social platforms to identify unmet prosthetic needs"

analysis:
  min_comment_words: 15
  include_irrelevant_in_stats: false
  relevance_keywords:
    - "prosthetic"
    - "prosthesis"
    - "amputee"
    - "amputation"
    - "socket"
    - "liner"
    - "phantom pain"
    - "myoelectric"
    - "osseointegration"
  categories:
    SF:
      name: "Socket fit / volume"
      description: "Volume fluctuation, loose or tight socket, sock ply management"
      keywords: ["socket", "volume", "loose", "tight", "pistoning", "fitting", "alignment"]
    PM:
      name: "Pain (mechanical)"
      description: "Socket pressure, bone pain, skin-socket interface pain"
      keywords: ["pressure point", "bone pain", "sore", "painful", "hurts", "rubbing"]
    PP:
      name: "Phantom pain"
      description: "Phantom limb pain, phantom sensation, neuroma"
      keywords: ["phantom pain", "phantom limb", "neuroma", "nerve pain", "tingling"]
    HS:
      name: "Heat / sweat"
      description: "Thermal discomfort, perspiration in liner or socket"
      keywords: ["sweat", "sweating", "hot", "heat", "moisture", "overheating"]
    WI:
      name: "Wish / future desire"
      description: "Explicit improvement wishes"
      keywords: ["wish", "hope", "want", "dream", "if only", "should be", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bif only\\b"
    - "\\bwould be nice\\b"
    - "\\bshould be\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: true
    api_key_env: "YOUTUBE_API_KEY"
    search_queries:
      - "amputee daily life prosthetic"
      - "prosthetic socket problems"
    priority_channels:
      - handle: "@FootlessJo"
        name: "Footless Jo"
    video_priority_keywords:
      - "socket"
      - "pain"
      - "review"
    quota:
      max_channels: 10
      max_videos_per_channel: 6
      max_comments_per_video: 120
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 20

  reddit:
    enabled: true
    subreddits: ["amputee", "prosthetics", "Osseointegration"]
    search_queries:
      - "prosthetic socket problems"
      - "phantom pain treatment"
    sort: "relevance"
    time_filter: "all"
    quota:
      max_posts_per_query: 40
      max_comments_per_post: 80

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries: []
    search_operators: ""
    quota:
      max_results_per_query: 0
      max_total_tweets: 0

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

validation:
  enabled: false
  references: []
