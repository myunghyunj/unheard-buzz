project:
  name: "Urban Beekeeping Challenges"
  description: "Community listening brief on hive management, regulation, pest control, neighbor friction, and seasonal failure points in urban beekeeping."
  objectives:
    - "Identify the operational and emotional pain points that make urban beekeeping hard to sustain."
    - "Compare new-keeper confusion against advanced maintenance and regulatory burdens."
    - "Capture concrete unmet needs around diagnostics, prevention, and neighborhood-safe operation."
  target_audiences:
    - "Beekeeping education and tools brands"
    - "Urban agriculture programs"
    - "Climate and pollinator-tech founders"
  key_questions:
    - "What makes city beekeeping uniquely different from backyard or rural contexts?"
    - "Which issues are knowledge gaps versus equipment or regulation constraints?"
    - "Where do keepers ask for better warning systems, treatment guidance, or swarm prevention?"
  decision_uses:
    - "Prioritize education, monitoring, and seasonal planning products."
    - "Design better segmentation for novice urban keepers and hobbyist operators."

analysis:
  min_comment_words: 10
  include_irrelevant_in_stats: false
  language_allowlist: ["en"]
  dedup_normalized_text: true
  dedup_min_chars: 40
  relevance_keywords:
    - "beekeeping"
    - "urban beekeeping"
    - "bee hive"
    - "apiary"
    - "swarm"
    - "honey"
    - "varroa"
    - "queen bee"
    - "mite treatment"
  segments:
    NEW:
      name: "New keeper"
      description: "First or early-season urban beekeepers."
      keywords: ["new beekeeper", "first hive", "first year", "beginner", "just started"]
    CITY:
      name: "Dense urban setting"
      description: "Rooftops, close neighbors, and highly constrained spaces."
      keywords: ["urban", "city", "rooftop", "neighbors", "small yard", "apartment"]
    WINTER:
      name: "Overwintering"
      description: "Cold-season survival, feeding, and seasonal stress."
      keywords: ["winter", "overwinter", "cold", "feeding", "winter loss"]
  categories:
    MA:
      name: "Maintenance & pests"
      description: "Hive upkeep, mites, feeding, inspections, and routine operational burden."
      keywords: ["maintenance", "mite", "varroa", "pest", "feeding", "inspection", "cleaning"]
    RE:
      name: "Regulations & zoning"
      description: "Permits, ordinances, HOA friction, and legal ambiguity."
      keywords: ["permit", "zoning", "regulation", "ordinance", "hoa", "legal", "law"]
    SW:
      name: "Swarm & neighbor relations"
      description: "Swarming, stings, complaints, and social tension with nearby residents."
      keywords: ["swarm", "swarming", "neighbor", "complaint", "stung", "angry neighbor", "public concern"]
    OW:
      name: "Overwintering & colony loss"
      description: "Seasonal survival, weak colonies, starvation, and winter preparation."
      keywords: ["winter", "overwinter", "colony loss", "deadout", "survive winter", "starvation"]
    HO:
      name: "Harvesting & equipment"
      description: "Extraction, storage, messy workflows, and processing pain."
      keywords: ["harvest", "extraction", "extractor", "processing", "sticky", "yield", "bottling"]
    HE:
      name: "Health & queen management"
      description: "Brood patterns, queen issues, disease signs, and treatment decisions."
      keywords: ["queen", "brood", "disease", "nosema", "chalkbrood", "queenless", "laying worker"]
    WI:
      name: "Wish / improvements"
      description: "Requests for easier diagnostics, safer practices, or clearer playbooks."
      keywords: ["wish", "hope", "want", "need", "better", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bbetter\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: true
    api_key_env: "YOUTUBE_API_KEY"
    search_queries:
      - "urban beekeeping problems"
      - "varroa treatment beginner"
      - "beekeeping neighbor complaint"
    priority_channels:
      - name: "University of Guelph Honey Bee Research Centre"
        content_style: "education"
      - name: "Bob Binnie"
        content_style: "practical beekeeping"
    video_priority_keywords:
      - "urban beekeeping"
      - "varroa"
      - "swarm"
      - "winter"
      - "beginner"
    quota:
      max_channels: 14
      max_videos_per_channel: 8
      max_comments_per_video: 120
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 10

  reddit:
    enabled: true
    subreddits: ["beekeeping", "urbanfarming", "backyardbeekeeping", "bees"]
    search_queries:
      - "urban beekeeping problems"
      - "varroa treatment help"
      - "neighbor complaint bees"
      - "overwinter hive loss"
    sort: "relevance"
    time_filter: "year"
    quota:
      max_posts_per_query: 60
      max_comments_per_post: 120

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries: []
    search_operators: "-is:retweet lang:en"
    quota:
      max_results_per_query: 0
      max_total_tweets: 0

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

reporting:
  quote_count: 20
  max_cooccurrence_pairs: 10
  top_category_limit: 8

validation:
  enabled: false
  references: []
