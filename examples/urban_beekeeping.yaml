project:
  name: "Urban Beekeeping Challenges"
  description: "Mining comments from urban beekeepers about hive maintenance, regulations, swarm control, and honey harvesting"

analysis:
  min_comment_words: 15
  include_irrelevant_in_stats: false
  relevance_keywords:
    - "beekeeping"
    - "urban beekeeping"
    - "bee hive"
    - "apiary"
    - "swarm"
    - "honey"
    - "Varroa"
  categories:
    MA:
      name: "Maintenance & pests"
      description: "Hive upkeep and pest control"
      keywords: ["maintenance", "mite", "Varroa", "pest", "feeding", "cleaning"]
    RE:
      name: "Regulations & zoning"
      description: "Permits, zoning, and local regulations"
      keywords: ["law", "permit", "zoning", "regulation", "ordinance", "legal"]
    SW:
      name: "Swarm & neighbour relations"
      description: "Swarming and neighbour complaints"
      keywords: ["swarm", "swarming", "neighbor", "complaint", "stung"]
    HO:
      name: "Harvesting & processing"
      description: "Honey extraction and yield management"
      keywords: ["harvest", "extraction", "processing", "yield", "extractor"]
    HE:
      name: "Health & disease management"
      description: "Colony health and disease treatment"
      keywords: ["disease", "treatment", "health", "nosema", "brood"]
    WI:
      name: "Wish / improvements"
      description: "Explicit improvement wishes"
      keywords: ["wish", "hope", "want", "need", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: false
    api_key_env: "YOUTUBE_API_KEY"
    search_queries: []
    priority_channels: []
    video_priority_keywords: []
    quota:
      max_channels: 0
      max_videos_per_channel: 0
      max_comments_per_video: 0
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 0

  reddit:
    enabled: true
    subreddits: ["beekeeping", "urbanfarming", "backyardbeekeeping", "bees"]
    search_queries:
      - "urban beekeeping problems"
      - "swarm prevention urban"
      - "urban beekeeping laws"
    sort: "relevance"
    time_filter: "all"
    quota:
      max_posts_per_query: 50
      max_comments_per_post: 100

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries: []
    search_operators: ""
    quota:
      max_results_per_query: 0
      max_total_tweets: 0

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

validation:
  enabled: false
  references: []
