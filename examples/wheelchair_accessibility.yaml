project:
  name: "Wheelchair Accessibility Unmet Needs"
  description: "Mining user comments about accessibility challenges faced by wheelchair users in urban environments"

analysis:
  min_comment_words: 15
  include_irrelevant_in_stats: false
  relevance_keywords:
    - "wheelchair"
    - "powerchair"
    - "accessibility"
    - "curb cut"
    - "ramp"
    - "elevator"
    - "public transit"
    - "sidewalk"
  categories:
    PT:
      name: "Public transport"
      description: "Access to buses, trains, subways, lifts, and boarding support"
      keywords: ["bus", "train", "subway", "transport", "ramp", "lift", "boarding"]
    IN:
      name: "Infrastructure"
      description: "Sidewalks, curb cuts, potholes, snow removal, and crossings"
      keywords: ["sidewalk", "pothole", "curb", "curb cut", "snow", "crosswalk"]
    BU:
      name: "Building access"
      description: "Entrances, elevators, bathrooms, and internal circulation"
      keywords: ["elevator", "door", "entrance", "bathroom", "stairs"]
    WI:
      name: "Wish / improvements"
      description: "Explicit improvement wishes"
      keywords: ["wish", "hope", "want", "need", "improve"]
  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: false
    api_key_env: "YOUTUBE_API_KEY"
    search_queries: []
    priority_channels: []
    video_priority_keywords: []
    quota:
      max_channels: 0
      max_videos_per_channel: 0
      max_comments_per_video: 0
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 0

  reddit:
    enabled: true
    subreddits: ["wheelchairs", "disability", "accessibility", "travel"]
    search_queries:
      - "wheelchair accessibility"
      - "wheelchair curb cut problems"
      - "accessible public transport"
    sort: "relevance"
    time_filter: "all"
    quota:
      max_posts_per_query: 50
      max_comments_per_post: 100

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries: []
    search_operators: ""
    quota:
      max_results_per_query: 0
      max_total_tweets: 0

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 0

validation:
  enabled: false
  references: []
