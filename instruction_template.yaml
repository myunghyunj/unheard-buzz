# ============================================================================
# unheard-buzz — Instruction Template
# ============================================================================
# Usage:
#   python3 tools/run.py --instruction instruction.yaml
#
# Authoring philosophy:
# - Keep the project brief decision-oriented.
# - Make relevance keywords broad enough to catch real conversation.
# - Make categories specific enough to support prioritization.
# - Add segments when you want structured comparisons inside the report.
# ============================================================================

project:
  name: "Your Project Name"
  description: "What unmet need, market, workflow, or user pain point you are investigating"
  objectives:
    - "Identify the most common unmet needs expressed in public conversation"
    - "Surface quotable voice-of-customer language for product and GTM teams"
  target_audiences:
    - "Product team"
    - "Founder / GM"
    - "Research / Insights"
  key_questions:
    - "What are users struggling with most today?"
    - "Which issues generate explicit wish or improvement language?"
    - "Which segments or platforms over-index on certain complaints?"
  decision_uses:
    - "Prioritize roadmap bets"
    - "Shape messaging and positioning"
    - "Choose follow-up qualitative interviews"

analysis:
  min_comment_words: 15
  include_irrelevant_in_stats: false

  # Optional language filtering for collectors that expose language hints.
  # Example: ["en"] or ["en", "ko"]
  language_allowlist: []

  # Deduplicate near-identical normalized text across overlapping searches.
  dedup_normalized_text: true
  dedup_min_chars: 40

  # Broad domain markers used to decide whether a post is on-topic.
  relevance_keywords:
    - "keyword1"
    - "keyword2"
    - "keyword3"

  # Optional segment schema for side-by-side comparisons in summary reports.
  segments:
    SEG1:
      name: "Segment Name"
      description: "Who or what this segment represents"
      keywords: ["segment keyword a", "segment keyword b"]

  # Categories for classifying pain points, barriers, or desired outcomes.
  categories:
    CAT1:
      name: "Category Name"
      description: "What this category captures"
      keywords: ["keyword_a", "keyword_b", "keyword_c"]
      opportunity_signals:
        - "Moments where users describe workarounds, unmet expectations, or purchase friction"
      example_phrases:
        - "I wish..."
        - "This never works when..."
    CAT2:
      name: "Another Category"
      description: "A different unmet-need bucket"
      keywords: ["keyword_d", "keyword_e"]

  wish_patterns:
    - "\\bwish\\b"
    - "\\bhope\\b"
    - "\\bwant\\b"
    - "\\bneed\\b"
    - "\\bif only\\b"
    - "\\bwould be nice\\b"
    - "\\bshould be\\b"
    - "\\bimprove\\b"

platforms:
  youtube:
    enabled: true
    api_key_env: "YOUTUBE_API_KEY"
    search_queries:
      - "your topic review"
      - "your topic problems"
      - "your topic daily life"
    priority_channels:
      - handle: "@examplechannel"
        name: "Example Channel"
        content_style: "vlog"
        rationale: "Known for firsthand user stories"
    video_priority_keywords:
      - "review"
      - "problems"
      - "honest"
      - "comparison"
      - "experience"
      - "daily life"
    quota:
      max_channels: 20
      max_videos_per_channel: 8
      max_comments_per_video: 150
    transcript:
      enabled: false
      whisper_model: "medium"
      max_videos: 20
      term_corrections: {}

  reddit:
    enabled: true
    subreddits:
      - "relevant_subreddit"
    search_queries:
      - "your topic discussion"
      - "your topic problems"
    sort: "relevance"
    time_filter: "year"
    quota:
      max_posts_per_query: 50
      max_comments_per_post: 100

  twitter:
    enabled: false
    api_key_env: "TWITTER_BEARER_TOKEN"
    search_queries:
      - "your topic"
      - "#relevant_hashtag"
    search_operators: "-is:retweet lang:en"
    quota:
      max_results_per_query: 100
      max_total_tweets: 500

  linkedin:
    enabled: false
    api_key_env: "LINKEDIN_ACCESS_TOKEN"
    search_queries: []
    quota:
      max_posts: 50

reporting:
  quote_count: 25
  max_cooccurrence_pairs: 15
  top_category_limit: 10

validation:
  enabled: false
  references:
    - name: "Author et al. 2024"
      title: "Study title"
      key_findings:
        CAT1: "Finding about CAT1"
